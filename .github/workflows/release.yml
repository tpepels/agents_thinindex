name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release-artifacts:
    name: build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo install cargo-deny --locked
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo deny check licenses
      - run: cargo run --bin wi -- --help
      - run: cargo run --bin wi -- --version
      - run: cargo run --bin build_index -- --version
      - run: cargo run --bin wi-init -- --version
      - run: cargo run --bin wi-stats -- --version
      - run: test -f THIRD_PARTY_NOTICES
      - run: scripts/package-release
      - run: |
          archive="$(ls dist/thinindex-*.tar.gz)"
          tar -tzf "$archive"
          scripts/check-package-contents "$archive"
      - uses: actions/upload-artifact@v4
        with:
          name: thinindex-release-artifacts
          path: |
            dist/thinindex-*.tar.gz
            dist/thinindex-*.tar.gz.sha256
          if-no-files-found: error
